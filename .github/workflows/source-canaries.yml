name: Verify regulatory source canaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/sources.yaml"
      - "requirements.txt"
      - "src/policy_daily/collectors/**"
      - "scripts/check_source_canaries.py"
      - ".github/workflows/source-canaries.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verify known official documents
        run: python scripts/check_source_canaries.py
