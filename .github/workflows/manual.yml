name: Manual report
on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 报告类型
        required: true
        default: daily
        type: choice
        options: [daily, weekly, monthly]
      start_date: {description: "开始日期 YYYY-MM-DD（可选）", required: false, type: string}
      end_date: {description: "结束日期 YYYY-MM-DD（可选）", required: false, type: string}
      send_email: {description: "发送邮件（仅有内容日报有效）", required: true, default: false, type: boolean}
      force: {description: "强制重新生成", required: true, default: false, type: boolean}
      dry_run: {description: "仅生成邮件预览", required: true, default: true, type: boolean}
permissions:
  contents: write
concurrency:
  group: policy-daily
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - name: Fetch private recipient config
        if: ${{ inputs.report_type == 'daily' && inputs.send_email == true && inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_CONFIG_TOKEN }}
          CONFIG_REPO: ${{ secrets.PRIVATE_CONFIG_REPO }}
        run: |
          test -n "$GH_TOKEN" && test -n "$CONFIG_REPO"
          curl --fail --silent --show-error -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.raw+json" "https://api.github.com/repos/$CONFIG_REPO/contents/recipients.yaml" -o recipients.yaml
      - name: Generate requested report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        shell: bash
        run: |
          args=(--report-type "${{ inputs.report_type }}")
          [[ "${{ inputs.report_type }}" != "daily" ]] && args+=(--skip-collect)
          [[ -n "${{ inputs.start_date }}" ]] && args+=(--start "${{ inputs.start_date }}")
          [[ -n "${{ inputs.end_date }}" ]] && args+=(--end "${{ inputs.end_date }}")
          [[ "${{ inputs.force }}" == "true" ]] && args+=(--force)
          [[ "${{ inputs.send_email }}" == "true" ]] && args+=(--send-email)
          [[ "${{ inputs.dry_run }}" == "false" ]] && args+=(--no-dry-run)
          python -m policy_daily.main "${args[@]}"
      - name: Commit generated public data
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data
          git diff --cached --quiet || git commit -m "data: update ${{ inputs.report_type }} report"
          git push
