name: Backfill July 15-22 dry-run
# Second run records auditable raw candidates and per-source AI outcomes.
on:
  push:
    paths:
      - .github/workflows/backfill-july-15-22.yml
permissions:
  contents: write
concurrency:
  group: policy-daily
  cancel-in-progress: false
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - run: pytest
      - name: Backfill eight daily reports without email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          test -n "$DEEPSEEK_API_KEY"
          python -m policy_daily.backfill --start 2026-07-15 --end 2026-07-22
      - name: Commit generated database
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data
          git diff --cached --quiet || git commit -m "data: backfill 2026-07-15 through 2026-07-22"
          git push
