name: Deploy GitHub Pages
on:
  push:
    branches: [main]
    paths: ["site/**", "data/**", "src/policy_daily/site_builder.py", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - run: python -m policy_daily.main --report-type daily --skip-collect --data-dir data --output-dir site-dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: {path: site-dist}
      - id: deployment
        uses: actions/deploy-pages@v4

