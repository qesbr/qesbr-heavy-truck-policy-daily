name: First collection dry-run
on:
  push:
    branches: [main]
    paths: [.github/workflows/first-dry-run.yml]
permissions:
  contents: write
concurrency:
  group: policy-daily
  cancel-in-progress: false
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - name: Verify required secret exists
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: test -n "$DEEPSEEK_API_KEY"
      - name: Collect and generate without email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m policy_daily.main --report-type daily --force --dry-run
      - name: Commit public report data
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data
          git diff --cached --quiet || git commit -m "data: first collection dry-run"
          git push
