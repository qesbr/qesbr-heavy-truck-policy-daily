  - id: eurlex_oj
    name: EUR-Lex
    adapter: api
    api_kind: eurlex_cellar
    url: https://publications.europa.eu/webapi/rdf/sparql
    channel: 欧盟官方公报L系列
    document_types: [Regulation, Directive, Decision]
    url_patterns: ["/legal-content/", "CELEX"]
    source_type: 法规组织
    authority: 100
    evidence_level: S
    region: 欧盟
    query:
      limit: 500
      terms:
        - heavy-duty
        - heavy duty
        - commercial vehicle
        - truck
        - road vehicle
        - vehicle emission
        - zero-emission vehicle
        - battery
        - recharging
        - alternative fuels
        - type-approval

  - id: eu_transport
    name: 欧盟委员会交通与运输总司
    adapter: official_site
    url: https://transport.ec.europa.eu/news-events/news_en
    channel: 欧盟交通政策动态
    document_types: [政策, 征求意见, 实施公告]
    url_patterns: ["/news-events/news/"]
    source_type: 政府
    authority: 100
    evidence_level: A
    region: 欧盟

  - id: us_federal_register_vehicle
    name: 美国Federal Register
    adapter: api
    api_kind: federal_register
    url: https://www.federalregister.gov/api/v1/documents.json
    channel: 美国车辆、排放与能源法规
    document_types: [Rule, Proposed Rule, Notice]
    query:
      agencies: [transportation-department, environmental-protection-agency, energy-department, national-highway-traffic-safety-administration]
      terms: ["heavy-duty vehicle", "commercial vehicle", "zero-emission vehicle", "truck", "vehicle emissions", "electric vehicle charging"]
    exclude_patterns:
      - "applications? for (?:an? |renewal of )?exemptions?"
      - "exemption applications?"
      - "request to include .* exemptions?"
      - "information collection activities"
      - "notice of (?:actions|applications) on (?:new )?special permits"
      - "privacy act of"
      - "fees for (?:commercial driver's license|the unified carrier)"
      - "availability of .* registration system"
      - "agricultural aircraft"
      - "energy conservation program: notification of petition"
      - "water carriers"
      - "airworthiness directives"
      - "advisory circular"
    source_type: 政府
    authority: 100
    evidence_level: S
    region: 美国

