  - id: us_federal_register_vehicle
    name: 美国Federal Register
    adapter: api
    api_kind: federal_register
    url: https://www.federalregister.gov/api/v1/documents.json
    channel: 美国车辆、排放与能源法规
    document_types: [Rule, Proposed Rule, Notice]
    query:
      agencies: [transportation-department, environmental-protection-agency, energy-department, national-highway-traffic-safety-administration]
      terms: ["heavy-duty vehicle", "commercial vehicle", "zero-emission vehicle", "truck", "vehicle emissions", "electric vehicle charging"]
    exclude_patterns:
      - "application for exemptions?"
      - "exemption applications?"
      - "information collection activities"
      - "airworthiness directives"
      - "advisory circular"
    source_type: 政府
    authority: 100
    evidence_level: S
    region: 美国

  - id: carb_heavy_duty
    name: California Air Resources Board
    adapter: official_site
    url: https://ww2.arb.ca.gov/our-work/programs/advanced-clean-trucks
    channel: 加州零排放重卡法规
    document_types: [Regulation, Workshop, Notice, Amendment]
    source_type: 政府
    authority: 100
    evidence_level: A
    region: 美国-加州

  - id: icct_heavy_duty
    name: 国际清洁交通委员会 ICCT
    adapter: official_site
    url: https://theicct.org/publications/
    channel: 重型车辆政策研究
    document_types: [研究报告, 政策分析]
    url_patterns: ["/publication/"]
    include_keywords:
      - heavy-duty
      - heavy duty
      - truck
      - commercial vehicle
      - medium-duty
      - medium duty
      - bus
      - freight
    source_type: 研究机构
    authority: 85
    evidence_level: B
    region: 全球
