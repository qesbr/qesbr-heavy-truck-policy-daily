<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="全球重卡、纯电重卡、动力电池与充换电政策法规日报">
  <title>政策法规日报</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <aside class="archive-panel">
    <a class="side-brand" href="#" aria-label="政策法规日报首页"><span>规</span><strong>政策法规日报</strong></a>
    <nav class="type-tabs" aria-label="报告类型">
      <button class="type-tab active" data-type="daily">日报</button>
      <button class="type-tab" data-type="weekly">周报</button>
      <button class="type-tab" data-type="monthly">月报</button>
    </nav>
    <div id="archive" class="archive" aria-label="历史报告"></div>
  </aside>
  <main class="report-page">
    <header class="report-header">
      <p id="volume" class="volume">POLICY INTELLIGENCE</p>
      <h1 id="reportTitle">政策法规日报</h1>
      <p id="reportPeriod" class="report-period">数据载入中</p>
    </header>
    <div class="double-rule"></div>
    <section id="lead" class="lead-card"></section>
    <section id="metrics" class="metrics"></section>
    <section id="contents" class="contents-card"></section>
    <section id="stories" class="stories"></section>
    <section id="empty" class="empty" hidden>
      <strong>本期暂无重要更新</strong>
      <p>本期没有同时满足正文、发布时间与相关性核验的信息，可以从左侧切换其他期次。</p>
    </section>
  </main>
  <script src="site-config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
